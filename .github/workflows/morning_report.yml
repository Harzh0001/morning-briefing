name: Morning Tech Report

on:
  schedule:
    # Trigger fires at exactly 02:30 UTC every day (Translates to 8:00 AM IST)
    - cron: '30 2 * * *'
  workflow_dispatch: # Retains a manual override toggle button in the GitHub UI

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        
      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Cache & Install Package Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Execute Autonomous Scraper Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python scraper.py

      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_report.md
          git commit -m "Automated update of latest_report.md" || echo "No changes to commit"
          git push
